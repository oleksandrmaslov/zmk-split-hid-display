description: |
  Defines a split peripheral output relay channel.

compatible: "zmk,split-peripheral-output-relay"

include: base.yaml

properties:
  relay-channel:
    type: int
    default: 1
    description: |
      Channel identifier used by the central half when forwarding an output
      event to the peripheral. For Raw HID forwarding, this should match
      CONFIG_RAW_HID_SPLIT_RELAY_CHANNEL.

  device:
    type: phandle
    required: true
    description: |
      Device associated with this relay channel on the peripheral half.
